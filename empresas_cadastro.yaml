# ============================================================================
# NOTAS:
#
# 1. COMO ENCONTRAR O nome_cvm:
#    - Acesse: https://dados.cvm.gov.br/dados/CIA_ABERTA/CAD/DADOS/cad_cia_aberta.csv
#    - Busque pelo nome comercial da empresa na coluna DENOM_COMERC ou DENOM_SOCIAL
#    - O nome_cvm deve bater exatamente com uma dessas colunas
#
# 2. COMO IDENTIFICAR AS CATEGORIAS DO RI:
#    - Abra o site de RI da empresa na página de resultados
#    - O sistema lista as categorias automaticamente no log ao rodar a coleta
#    - Categorias comuns: "central-release", "central-itr-dfp"
#    - ATENÇÃO: a categoria varia por empresa! Ex: "itr-dfp" vs "central-itr-dfp"
#      Verifique no log da coleta quais categorias estão disponíveis.
#    - Se o site NÃO usa plataforma MZ, deixe url_ri vazio e baixe os PDFs manualmente
#
# 3. EMPRESAS SEM CVM (tem_cvm: false):
#    - Crie a pasta manualmente
#    - Coloque os PDFs de ITR/DFP em {pasta}/ITR_DFP/
#    - Crie {pasta}/Dados_CVM/contas_chave.json com os dados financeiros
#    - Formato do JSON: veja a memória do projeto para o schema completo
#
# 4. PASTA PADRÃO:
#    - Todas as empresas ficam em: G:/Meu Drive/Análise de Crédito/{Nome}/
#    - Subpastas criadas automaticamente: Releases/, ITR_DFP/, Dados_CVM/
#
# 5. FLUXO COMPLETO DE ADIÇÃO (executar nesta ordem):
#    Etapa 1: python main.py --empresa "Nome" --apenas-ri    → Baixa PDFs (Releases + ITR/DFP)
#    Etapa 2: python main.py --empresa "Nome" --apenas-cvm   → Baixa dados estruturados da CVM
#    Etapa 3: No dashboard, clicar em "Extrair/Atualizar cronogramas dos PDFs"
#             → Extrai cronogramas de amortização dos ITR/DFP baixados na Etapa 1
#    Ou simplesmente: python main.py --empresa "Nome"         → Faz Etapas 1+2 de uma vez
#
# 6. CRONOGRAMA DE AMORTIZAÇÃO:
#    - Extraído automaticamente dos PDFs de ITR/DFP (notas explicativas)
#    - Requer que os PDFs estejam em {pasta}/ITR_DFP/
#    - No dashboard, seção "Cronograma de Amortização e Liquidez", botão "Extrair/Atualizar"
#    - Resultado salvo em {pasta}/Dados_CVM/cronogramas.json
# ============================================================================
