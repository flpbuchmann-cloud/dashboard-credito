# ============================================================================
# CADASTRO DE EMPRESAS — Dashboard de Crédito
# ============================================================================
# Preencha este arquivo para adicionar uma nova empresa ao dashboard.
# Após preencher, peça ao Claude para processar o cadastro.
#
# CAMPOS OBRIGATÓRIOS estão marcados com (*)
# CAMPOS OPCIONAIS estão marcados com (~)
# ============================================================================

empresas:

  # ---- Exemplo preenchido (CSN Mineração) ----
  - nome: "Minerva"                        # (*) Nome de exibição no dashboard
    ticker: "BEEF3"                               # (*) Código na B3 (ou "N/A" se não listada)
    setor: "Proteína"                            # (*) Setor de atuação

    # --- Dados CVM (empresa listada na B3) ---
    tem_cvm: true                                 # (*) true = busca automática na CVM; false = dados manuais
    nome_cvm: "MINERVA S.A"                     # (~) Razão social na CVM (obrigatório se tem_cvm: true)

    # --- Site de RI (para download automático de PDFs) ---
    url_ri: "https://ri.minervafoods.com/resultados-trimestrais/"
    categorias_release:                           # (~) Categorias de releases no site de RI
      - "central-release"
    categorias_dfp_itr:                           # (~) Categorias de ITR/DFP no site de RI
      - "itr-dfp"

    # --- Pastas ---
    pasta: "G:/Meu Drive/Análise de Crédito/Minerva"  # (*) Pasta raiz da empresa

    # --- Coleta ---
    ano_inicio: 2021                              # (*) Ano inicial para buscar dados
    ano_fim: null                                 # (~) Ano final (null = até o mais recente)

    # --- Status ---
    status: "ativo"                               # ativo | pendente | erro


